name: depositsystem
description: "A production-ready crypto deposit and withdrawal system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  dio: ^5.4.0
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.6
  share_plus: ^10.1.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - asset/
